<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>reactive</title>
<style>
  :root {
    color-scheme: light dark;
    --fg:     light-dark(#1a1a1a, #e4e4e4);
    --bg:     light-dark(#fdfdfd, #141414);
    --muted:  light-dark(#666, #888);
    --panel:  light-dark(#f4f4f4, #1e1e1e);
    --border: light-dark(#ddd, #2a2a2a);
    --accent: light-dark(#0b57d0, #8ab4f8);
    --shadow:
      0 1px 3px light-dark(rgba(0,0,0,.08), rgba(0,0,0,.5)),
      0 0 0 1px light-dark(rgba(0,0,0,.03), rgba(255,255,255,.04));
    --radius: 0.5rem;
    --space: 1.5rem;
    --font-ui: ui-rounded, system-ui, sans-serif;
  }

  * {
    margin: 0;
    box-sizing: border-box;
  }

  html {
    font: 1rem / 1.6 var(--font-ui);
    color: var(--fg);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }

  main {
    max-inline-size: 90ch;
    margin-inline: auto;
    padding: var(--space);

    & > header {
      margin-block-end: var(--space);
    }
  }

  h1 {
    font-size: 1.25rem;
    font-weight: 400;
    line-height: 1.4;
    margin-block-end: 0.25rem;
  }

  p {
    font-size: 0.875rem;
    color: var(--muted);
  }

  section[aria-label='Replicas'] {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(30ch, 1fr));
    gap: var(--space);
  }

  log-view {
    max-inline-size: 84ch;
    margin-inline: auto;
    margin-block-start: var(--space);
  }
</style>
</head>
<body>
<main>
  <header>
    <h1>reactive</h1>
    <p>Replicated domain objects. Local-first, eventually consistent.</p>
  </header>
  <section aria-label="Replicas">
    <json-editor id="foo" label="Foo"></json-editor>
    <json-editor id="bar" label="Bar"></json-editor>
  </section>
  <log-view id="log" aria-label="Transport log"></log-view>
</main>

const icons = Object.fromEntries(
  Object.entries(iconSources).map(([name, source]) => [name, compileIcon(source)])
)

function compileIcon(source) {
  const doc = new DOMParser().parseFromString(source, 'image/svg+xml')
  const svg = doc.documentElement
  const viewBox = svg.getAttribute('viewBox')

  if (!viewBox)
    throw new Error('icon is missing a viewBox')

  const [, , width, height] = viewBox.trim().split(/\s+/).map(Number)

  return {
    viewBox,
    ratio: `${width} / ${height}`,
    body: svg.innerHTML
  }
}

function icon(name, slot, shape = 'ratio') {
  const { viewBox, ratio, body } = icons[name]

  return html`
    <span
      class="icon"
      data-slot=${slot}
      data-shape=${shape}
      style=${`--icon-ratio:${ratio}`}>
      <svg
        viewBox=${viewBox}
        fill="currentColor"
        preserveAspectRatio="xMidYMid meet"
        aria-hidden="true"
        focusable="false">
        ${unsafeSVG(body)}
      </svg>
    </span>`
}

class JsonEditor extends HTMLElement {
  #data = {}
  #editing = true
  #error = null
  #focus = null
  #root = this.attachShadow({ mode: 'open' })

  get data() { return this.#data }

  set data(value) {
    this.#data = value
    this.#editing = false
    this.render()
  }

  connectedCallback() {
    if (!Object.keys(this.#data).length)
      this.render()
  }

  #save() {
    const el = this.#root.querySelector('textarea')

    try {
      const { id, ...next } = JSON.parse(el.value)

      for (const key of Object.keys(this.#data))
        if (!(key in next))
          delete this.#data[key]

      for (const [key, value] of Object.entries(next))
        this.#data[key] = value

      this.#editing = false
      this.#error = null
    } catch {
      this.#error = 'invalid JSON'
    }

    this.render()
  }

  #edit() {
    this.#editing = true
    this.#error = null
    this.render()
    this.#root.querySelector('textarea')?.focus()
  }

  #coerce(prev, next) {
    if (typeof prev === 'boolean')
      return next === 'true'

    if (typeof prev === 'number') {
      const value = Number(next)

      return next === '' || Number.isNaN(value) ? prev : value
    }

    return next
  }

  #commit(fn) {
    fn()
    this.render()
  }

  #item(key, index) {
    return [...this.#root.querySelectorAll('[data-item-input]')]
      .find(el =>
        el.dataset.key === key &&
        el.dataset.index === String(index))
  }

  #focusItem(key, index) {
    this.#focus = { key, index }
  }

  #moveFocus(event, key, index, step) {
    const input = this.#item(key, index + step)

    if (!input)
      return

    event.preventDefault()
    input.focus()

    if (
      event.target.selectionStart == null ||
      event.target.selectionEnd == null
    )
      return

    const start = Math.min(event.target.selectionStart, input.value.length)
    const end = Math.min(event.target.selectionEnd, input.value.length)

    input.setSelectionRange(start, end)
  }

  #onArrayKeydown(event, key, index) {
    if (event.key === 'ArrowUp')
      return event.shiftKey
        ? (event.preventDefault(), this.#moveUp(key, index))
        : this.#moveFocus(event, key, index, -1)

    if (event.key === 'ArrowDown')
      return event.shiftKey
        ? (event.preventDefault(), this.#moveDown(key, index))
        : this.#moveFocus(event, key, index, 1)
  }

  #set(key, value) {
    this.#commit(() =>
      this.#data[key] = this.#coerce(this.#data[key], value))
  }

  #setItem(key, index, value) {
    this.#commit(() =>
      this.#data[key].splice(
        index,
        1,
        this.#coerce(this.#data[key][index], value)
      ))
  }

  #addAfter(key, index) {
    this.#commit(() => this.#data[key].splice(index + 1, 0, ''))
  }

  #removeItem(key, index) {
    this.#commit(() => this.#data[key].splice(index, 1))
  }

  #moveUp(key, index) {
    if (index < 1) return
    const arr = this.#data[key]

    this.#focusItem(key, index - 1)

    this.#commit(() =>
      arr.splice(index - 1, 2, arr[index], arr[index - 1]))
  }

  #moveDown(key, index) {
    const arr = this.#data[key]

    if (index >= arr.length - 1) return

    this.#focusItem(key, index + 1)

    this.#commit(() =>
      arr.splice(index, 2, arr[index + 1], arr[index]))
  }

  #inputFor(key, value) {
    if (Array.isArray(value))
      return this.#arrayFor(key, value)

    if (typeof value === 'boolean')
      return html`
        <select
          aria-label=${key}
          @change=${e => this.#set(key, e.target.value)}>
          <option value="true" ?selected=${value}>true</option>
          <option value="false" ?selected=${!value}>false</option>
        </select>`

    return html`
      <input
        aria-label=${key}
        inputmode=${typeof value === 'number' ? 'decimal' : 'text'}
      .value=${String(value)}
      @input=${e => this.#set(key, e.target.value)}>`
  }

  #row(key, field) {
    return html`
      <tr>
        <td>${key}</td>
        <td>${field}</td>
      </tr>`
  }

  #arrayFor(key, items) {
    if (!items.length)
      return this.#row(key, html`
        <span>
            <input
              data-item-input
              data-key=${key}
              data-index="0"
              aria-label="${key} item 1"
              placeholder="empty"
              .value=${''}
              @keydown=${e => this.#onArrayKeydown(e, key, 0)}
              @input=${e => {
                if (!this.#data[key].length)
                  this.#addAfter(key, -1)
              this.#setItem(key, 0, e.target.value)
            }}>
          <span>
            <span></span>
            <span>
              <button
                type="button"
                aria-label="add first ${key} item"
                @click=${() => this.#addAfter(key, -1)}>+</button>
            </span>
          </span>
        </span>`)

    return items.map((item, i) => html`
      <tr>
        <td>${i === 0 ? key : ''}</td>
        <td>
          <span>
            <input
              data-item-input
              data-key=${key}
              data-index=${String(i)}
              aria-label="${key} item ${i + 1}"
              inputmode=${typeof item === 'number' ? 'decimal' : 'text'}
              placeholder="empty"
              .value=${String(item)}
              @keydown=${e => this.#onArrayKeydown(e, key, i)}
              @input=${e => this.#setItem(key, i, e.target.value)}>
            <span>
              <span class="stepper">
                <button
                  type="button"
                  ?disabled=${i < 1}
                  aria-label="move ${key} item ${i + 1} up"
                  @click=${() => this.#moveUp(key, i)}>
                  ${icon('arrow', 'array-stepper')}
                </button>
                <button
                  type="button"
                  ?disabled=${i >= items.length - 1}
                  aria-label="move ${key} item ${i + 1} down"
                  @click=${() => this.#moveDown(key, i)}>
                  ${icon('arrow', 'array-stepper')}
                </button>
              </span>
              <span>
                <button
                  type="button"
                  aria-label="add after ${key} item ${i + 1}"

                <button
                  type="button"
                  aria-label="remove ${key} item ${i + 1}"
                  @click=${() => this.#removeItem(key, i)}>×</button>
              </span>
            </span>
          </span>
        </td>
      </tr>`)
  }

  #rows() {
    return Object.entries(this.#data)

const PEERS = new WeakMap()

class Bus {
  #handlers = new Map()
  sent = []

  static createPair() {
    const a = new Bus()
    const b = new Bus()

    PEERS.set(a, b)
    PEERS.set(b, a)

    return { a, b }
  }

  send(event, payload) {
    this.sent.push({ event, payload })

    const peer = PEERS.get(this)

    if (peer)
      queueMicrotask(() => peer.#receive(event, payload))
  }

  on(event, handler) {
    const listeners = this.#handlers.get(event) ?? new Set()

    listeners.add(handler)
    this.#handlers.set(event, listeners)

    return () => listeners.delete(handler)
  }

  #receive(event, payload) {
    for (const handler of this.#handlers.get(event) ?? [])
      handler(payload)
  }
}

const createPeer = () => {
  class User extends Reactive {}
  return User
}

class App {
  #lines = []

  constructor({ log, foo, bar }) {
    this.ui = { log, foo, bar }
  }

  #summarize(payload) {
    return payload.op
      ? `${payload.path?.join('.')}.${payload.op}(${payload.args?.map(a => JSON.stringify(a)).join(', ')})`
      : payload.path
        ? `${payload.path.join('.')} = ${JSON.stringify(payload.value)}`
        : payload.id ?? ''
  }

  #payload(payload) {
    try {
      return payload === undefined
        ? 'undefined'
        : JSON.stringify(payload, null, 2) ?? String(payload)
    } catch {
      return String(payload)
    }
  }

  #append({ peer, event, payload }) {
    this.#lines.push({
      peer,
      kind: event.replace('reactive:', ''),
      preview: this.#summarize(payload),
      payload: this.#payload(payload),
    })

    if (this.#lines.length > 50)
      this.#lines.shift()

    this.ui.log.lines = [...this.#lines]
  }

  #tapBus(peer, bus) {
    return {
      on: bus.on.bind(bus),
      send: (event, payload) => {
        this.#append({ peer, event, payload })
        bus.send(event, payload)
      },
    }
  }

  #peer(label, bus) {
    const Peer = createPeer()
    const transport = this.#tapBus(label, bus)

    Peer.use(transport)

    return { Peer, transport }
  }

  #mount(foo, bar) {
    this.ui.foo.data = foo
    this.ui.bar.data = bar
  }

  #watch(view, bus) {
    bus.on('reactive:delta', () => view.render())
  }

  async init() {
    const { a, b } = Bus.createPair()
    const foo = this.#peer('Foo', a)
    const bar = this.#peer('Bar', b)

    const local = new foo.Peer('shared', {
      name: 'John',
      email: 'john@example.com',
      plan: 'pro',
      active: true,
      tags: ['admin', 'early-access'],
    })
    const remote = await bar.Peer.sync('shared')

    this.#mount(local, remote)
    this.#watch(this.ui.foo, foo.transport)
    this.#watch(this.ui.bar, bar.transport)
  }
}
